name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,image]"
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=leakshield --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  benchmark:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[image]"
    
    - name: Run benchmark tests
      run: |
        python benchmarks/run_benchmark.py
    
    - name: Check benchmark results
      run: |
        python -c "
        import json
        with open('benchmarks/results/benchmark_results.json') as f:
            data = json.load(f)
        results = data['results']
        matched = sum(1 for r in results if r['match'])
        total = len(results)
        rate = (matched / total) * 100
        print(f'Benchmark detection rate: {rate:.1f}% ({matched}/{total})')
        if rate < 80:
            print('WARNING: Detection rate below 80%')
            exit(1)
        "
